apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  namespace: {{ .Values.namespace }}
  labels:
    app: vote
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.vote.replicas }}
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: {{ .Values.vote.image.repository }}:{{ .Values.vote.image.tag }}
          imagePullPolicy: {{ .Values.vote.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.vote.port }}
          env:
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: votechain-config
                  key: AUTH_SERVICE_URL
            - name: VOTE_SECRET
              valueFrom:
                secretKeyRef:
                  name: votechain-secrets
                  key: VOTE_SECRET
          resources:
            requests:
              memory: {{ .Values.vote.resources.requests.memory }}
              cpu: {{ .Values.vote.resources.requests.cpu }}
            limits:
              memory: {{ .Values.vote.resources.limits.memory }}
              cpu: {{ .Values.vote.resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vote.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vote.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
