networks:
  votechain-net:
    driver: bridge

services:

  biometric-service:
    build: ./services/biometric
    container_name: votechain-biometric
    ports:
      - "8001:8001"
    networks:
      - votechain-net
    environment:
      - BIOMETRIC_PEPPER=votechain-dev-pepper-changeme
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  auth-service:
    build: ./services/auth
    container_name: votechain-auth
    ports:
      - "8002:8002"
    networks:
      - votechain-net
    environment:
      - TOKEN_SECRET=votechain-dev-secret-changeme
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      biometric-service:
        condition: service_healthy
    restart: unless-stopped

  vote-service:
    build: ./services/vote
    container_name: votechain-vote
    ports:
      - "8003:8003"
    networks:
      - votechain-net
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8002
      - VOTE_SECRET=votechain-dev-vote-secret
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      auth-service:
        condition: service_healthy
    restart: unless-stopped

