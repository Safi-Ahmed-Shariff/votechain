apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: votechain
  labels:
    app: auth
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        tier: backend
    spec:
      containers:
        - name: auth
          image: votechain/auth:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          env:
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: votechain-secrets
                  key: TOKEN_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
