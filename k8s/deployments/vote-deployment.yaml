apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  namespace: votechain
  labels:
    app: vote
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
        tier: backend
    spec:
      containers:
        - name: vote
          image: votechain/vote:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          env:
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: votechain-config
                  key: AUTH_SERVICE_URL
            - name: VOTE_SECRET
              valueFrom:
                secretKeyRef:
                  name: votechain-secrets
                  key: VOTE_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
