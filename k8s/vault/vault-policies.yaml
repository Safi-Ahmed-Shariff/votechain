apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-policies
  namespace: vault
data:
  vote-policy.hcl: |
    # Vote service can read its own secrets
    path "secret/data/vote/*" {
      capabilities = ["read", "list"]
    }
    
    # Vote service can read database credentials
    path "secret/data/database/vote" {
      capabilities = ["read"]
    }
  
  auth-policy.hcl: |
    # Auth service can read its own secrets
    path "secret/data/auth/*" {
      capabilities = ["read", "list"]
    }
    
    # Auth service can read database credentials
    path "secret/data/database/auth" {
      capabilities = ["read"]
    }
    
    # Auth service can read JWT signing key
    path "secret/data/jwt/signing-key" {
      capabilities = ["read"]
    }
  
  biometric-policy.hcl: |
    # Biometric service can read its own secrets
    path "secret/data/biometric/*" {
      capabilities = ["read", "list"]
    }
    
    # Biometric service can read encryption keys
    path "secret/data/encryption/biometric-key" {
      capabilities = ["read"]
    }
