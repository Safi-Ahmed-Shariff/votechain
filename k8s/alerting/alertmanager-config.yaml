apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-prometheus-kube-prometheus-alertmanager
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: 'webhook-receiver'
      group_by: ['alertname', 'namespace', 'pod']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 12h
      routes:
      - match:
          severity: critical
        receiver: 'webhook-receiver'
        group_wait: 5s
        repeat_interval: 5m
      - match:
          severity: warning
        receiver: 'webhook-receiver'
        group_wait: 10s
        repeat_interval: 1h

    receivers:
    - name: 'webhook-receiver'
      webhook_configs:
      - url: 'http://webhook-receiver.monitoring.svc.cluster.local:8080/webhook'
        send_resolved: true

    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'namespace', 'pod']
